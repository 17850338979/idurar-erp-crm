version: '3.8'
services:
  mongo:
    image: mongo:5.0
    restart: always
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
  backend:
    build: ./backend
    restart: always
    depends_on:
      - mongo
    ports:
      - "5000:5000"
  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
  ai-service:
    build: ./ai-service
    restart: always
    depends_on:
      - mongo
    ports:
      - "8080:8080"
volumes:
  mongo-data:
